name: trading
version: "0.2"

# ── Portfolio constraints (hard limits) ──
constraints:
  max_single_position: 0.10     # 10% max per name
  max_total_invested: 0.90      # ≤90% deployed
  min_cash_reserve: 0.10        # always keep ≥10% cash

# ── Paper trading ──
paper_trading:
  initial_capital: 1000000      # $1M starting capital
  portfolio_file: "portfolio.json"   # relative to memory/ dir
