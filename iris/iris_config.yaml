# ─────────────────────────────────────────────────────────────
# IRIS Context Layer — 改这里，不改代码
#
# 三分法：
#   Harness (代码)  → 公式、流程、安全检查 — 必须稳定正确
#   Context (本文件) → 权重、阈值、参数     — 依赖信息，可调
#   Prompt  (soul/)  → 哲学、风格、判断力   — 本来就不确定
# ─────────────────────────────────────────────────────────────

harness:
  max_tool_rounds: 25
  max_total_tool_calls: 60
  max_wall_time_seconds: 480
  max_retries: 3
  retry_base_delay: 1.0
  context_limit_chars: 300000
  compress_threshold_chars: 5000
  tool_compress_overrides:
    financials: 8000
    macro: 8000
    valuation: 10000
    news_feed: 6000
  tool_injection_mode: "all"   # expose all tools every round
  max_tools_per_round: 10
  always_exposed_tools:
    - exa_search
    - web_fetch
    - financials
    - macro
    - quote
    - history
    - valuation
    - create_hypothesis
    - add_evidence_card
    - remember
    - recall
    - search_knowledge
    - generate_trade_signal
    - execute_trade
    - get_portfolio
    - sec_filing
    - transcript
    - news_feed
  tool_triggers:
    exa_search: ["搜索", "查找", "search", "find", "新闻", "news"]
    web_fetch: ["网页", "网页内容", "链接", "url", "fetch", "抓取"]
    financials: ["财报", "收入", "利润", "revenue", "earnings", "估值", "pe", "p/e"]
    macro: ["宏观", "利率", "gdp", "cpi", "失业率", "macro", "fed"]
    create_hypothesis: ["假设", "thesis", "hypothesis"]
    add_evidence_card: ["证据", "支持", "反驳", "evidence"]
    valuation: ["估值", "valuation", "dcf", "comps", "fair value", "公允价值", "可比", "同行"]
    quote: ["股价", "报价", "price", "quote", "市值", "pe", "市盈率"]
    history: ["走势", "历史价格", "k线", "history", "趋势", "回撤"]
    remember: ["保存", "remember", "记录", "写入记忆"]
    recall: ["记忆", "回忆", "memory", "检索", "历史分析"]
    search_knowledge: ["知识库", "文档", "研报", "笔记", "knowledge", "报告", "上传"]
    generate_trade_signal: ["交易信号", "建仓", "减仓", "买入", "卖出", "trade signal"]
    execute_trade: ["执行交易", "确认交易", "execute trade"]
    get_portfolio: ["持仓", "组合", "portfolio", "仓位"]
    sec_filing: ["10-K", "10-Q", "SEC", "filing", "年报", "季报", "segment", "分部", "业务分部", "XBRL"]
    transcript: ["earnings call", "电话会", "管理层", "transcript", "纪要", "业绩会", "guidance", "指引"]
    news_feed: ["新闻", "news", "HN", "Reddit", "arXiv", "热点", "trending", "社区反馈", "信息源"]

# Deep research (evaluator loop) — opt-in enhancement for analysis mode
deep_research:
  enabled: false              # default off; pass deep_research=true per request
  max_eval_rounds: 5
  min_tools_for_eval: 2

budget:
  include_flush_in_tool_rounds: true
  include_compaction_in_tool_rounds: true
  pre_round_trim: true

loop_detection:
  generic_repeat_threshold: 3
  ping_pong_threshold: 3
  no_progress_threshold: 3
  action: "steer_then_stop"  # steer_then_stop | hard_stop | warn_only

compaction:
  strategy: "llm_summary"
  keep_recent_messages: 6
  summary_max_input_chars: 50000
  summary_prompt: |
    Summarize this investment analysis conversation concisely.
    PRESERVE: key data points, financial figures, tool results, decisions made, company tickers, hypothesis IDs, evidence IDs.
    DISCARD: pleasantries, redundant search attempts, failed tool calls.
    Output a structured summary in markdown.
  memory_flush:
    enabled: true
    prompt: |
      Context is about to be compacted. Review the conversation and save any key findings
      that should persist across sessions. Use remember for durable facts/notes.
      Use create_hypothesis if a thesis has formed but not been saved.
      Reply with a brief note of what you saved, or "Nothing to save" if all key info is already persisted.

vector_search:
  enabled: true
  model: "text-embedding-3-small"
  top_k: 5

cross_session:
  enabled: true
  max_observations: 10
  max_hypotheses: 3

memory:
  base_dir: "./memory"
  calibration_review_days: 90

knowledge:
  chunk_size: 800
  chunk_overlap: 200
  pdf_engine: docling      # docling for financial table accuracy; fallback to pymupdf

# ── LLM utility prompts (非 soul 层，是辅助提取/判断用的指令) ──
prompts:
  # 从用户输入中提取股票代码，用于加载历史分析上下文
  ticker_extraction: |
    Extract the primary stock ticker symbol from the user's investment query.
    Return JSON: {"ticker": "NVDA"} or {"ticker": null}.
    Must be a real tradable ticker (e.g. NVDA, META, 600519.SS).
    Do NOT return industry keywords like AI, IT, EV, ML, GDP, CEO, etc.
    If the query is about an industry/sector/concept rather than a specific stock, return null.

  # 从分析报告中提取结构化元数据，供前端 UI 渲染标签卡片
  metadata_extraction: |
    Extract structured metadata from an investment analysis.
    Return JSON with keys:
    ticker (string or null — the primary stock ticker analyzed, e.g. 'NVDA', 'META', '600519.SS';
    must be a real tradable ticker symbol, NOT an industry keyword like 'AI', 'IT', 'EV', 'ML'),
    recommendation (string or null — one of: STRONG BUY, BUY, HOLD, SELL, STRONG SELL,
    OVERWEIGHT, UNDERWEIGHT, OUTPERFORM, UNDERPERFORM, or null if none given),
    confidence (string or null — one of: high, medium, low, or null).
    If the query is a general question, greeting, industry overview, or not about a specific stock,
    return ticker as null.

skills:
  dir: "./skills"

# ── Mode-specific overrides ──
modes:
  analysis:
    soul_files: [role.md, v0.1.md, self_check.md, steering.md, tools.md]
    skills: [fundamentals, valuation, trading]
    tool_injection_mode: "all"
    always_exposed_tools:
      - exa_search
      - web_fetch
      - financials
      - macro
      - quote
      - history
      - valuation
      - create_hypothesis
      - add_evidence_card
      - remember
      - recall
      - search_knowledge
      - generate_trade_signal
      - execute_trade
      - get_portfolio
      - sec_filing
      - transcript
      - news_feed
      - emit_report
    max_tool_rounds: 25
    max_total_tool_calls: 60
    max_wall_time_seconds: 480

  learning:
    soul_files: [role.md, reflection.md, steering.md, tools.md]
    skills: [hypothesis, valuation, trading]
    tool_injection_mode: "all"
    always_exposed_tools:
      - exa_search
      - web_fetch
      - financials
      - macro
      - quote
      - history
      - valuation
      - create_hypothesis
      - add_evidence_card
      - remember
      - recall
      - search_knowledge
      - generate_trade_signal
      - execute_trade
      - get_portfolio
      - sec_filing
      - transcript
      - news_feed
    max_tool_rounds: 40
    max_total_tool_calls: 120
    max_wall_time_seconds: 600
