# ─────────────────────────────────────────────────────────────
# IRIS Context Layer — 改这里，不改代码
#
# 三分法：
#   Harness (代码)  → 公式、流程、安全检查 — 必须稳定正确
#   Context (本文件) → 权重、阈值、参数     — 依赖信息，可调
#   Prompt  (soul/)  → 哲学、风格、判断力   — 本来就不确定
# ─────────────────────────────────────────────────────────────

harness:
  max_tool_rounds: 25
  max_total_tool_calls: 60
  max_wall_time_seconds: 480
  max_retries: 3
  retry_base_delay: 1.0
  context_limit_chars: 300000
  compress_threshold_chars: 5000
  tool_compress_overrides:
    fmp_get_financials: 8000
    fred_get_macro: 8000
  tool_injection_mode: "dynamic"   # "dynamic" or "all"
  max_tools_per_round: 10
  always_exposed_tools:
    - query_knowledge
    - memory_search
    - recall_memory
    - save_memory
    - search_documents
    - build_dcf
    - get_comps
  tool_triggers:
    exa_search: ["搜索", "查找", "search", "find", "新闻", "news"]
    web_fetch: ["网页", "网页内容", "链接", "url", "fetch", "抓取"]
    fmp_get_financials: ["财报", "收入", "利润", "revenue", "earnings", "估值", "pe", "p/e"]
    fred_get_macro: ["宏观", "利率", "gdp", "cpi", "失业率", "macro", "fed"]
    extract_observation: ["观察", "事实", "提取", "observation", "extract"]
    create_hypothesis: ["假设", "thesis", "hypothesis"]
    add_evidence_card: ["证据", "支持", "反驳", "evidence"]
    build_dcf: ["估值", "valuation", "dcf", "fair value", "公允价值"]
    get_comps: ["comps", "可比", "同行", "peers", "对比"]
    recall_memory: ["记忆", "回忆", "memory", "历史分析"]
    save_memory: ["保存", "save", "记录"]
    check_calibration: ["校准", "calibration", "偏差", "bias"]
    query_knowledge: ["历史", "知识", "query", "已研究"]
    memory_search: ["语义搜索", "semantic", "相关记忆"]
    upload_document: ["上传", "文档", "upload", "document", "保存文档"]
    search_documents: ["知识库", "文档搜索", "研报", "笔记", "knowledge"]
    yf_quote: ["股价", "报价", "price", "quote", "市值", "pe", "市盈率"]
    yf_history: ["走势", "历史价格", "k线", "history", "趋势", "回撤"]

budget:
  include_flush_in_tool_rounds: true
  include_compaction_in_tool_rounds: true
  pre_round_trim: true

loop_detection:
  generic_repeat_threshold: 3
  ping_pong_threshold: 3
  no_progress_threshold: 3
  action: "steer_then_stop"  # steer_then_stop | hard_stop | warn_only

compaction:
  strategy: "llm_summary"
  keep_recent_messages: 6
  summary_max_input_chars: 50000
  summary_prompt: |
    Summarize this investment analysis conversation concisely.
    PRESERVE: key data points, financial figures, tool results, decisions made, company tickers, hypothesis IDs, evidence IDs.
    DISCARD: pleasantries, redundant search attempts, failed tool calls.
    Output a structured summary in markdown.
  memory_flush:
    enabled: true
    prompt: |
      Context is about to be compacted. Review the conversation and save any key findings
      that should persist across sessions. Use extract_observation for important facts/data.
      Use create_hypothesis if a thesis has formed but not been saved.
      Reply with a brief note of what you saved, or "Nothing to save" if all key info is already persisted.

vector_search:
  enabled: true
  model: "text-embedding-3-small"
  top_k: 5

cross_session:
  enabled: true
  max_observations: 10
  max_hypotheses: 3

memory:
  base_dir: "./memory"
  calibration_review_days: 90

knowledge:
  chunk_size: 800
  chunk_overlap: 200

skills:
  dir: "./skills"
